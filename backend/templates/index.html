<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>The Post Station</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/static/style.css">
</head>

<body>

   <body>

    <!-- TOP BAR -->
    <div class="top-bar">
        <!-- Logo -->
        <img src="/static/assets/logo.jpg" alt="Logo" class="logo">

        <!-- Search -->
        <form action="/access-post" method="POST" class="search-form" onsubmit="return validateTopBar()"> 
            <input type="text" name="waybill" placeholder="Waybill ID" required>
            <input type="password" name="key" placeholder="Courier Key" required>
            <button type="submit" class="LocatePost">Locate Post</button>
        </form>
    </div>

    <!-- MAIN CONTENT -->
    <div class="main-wrapper">
        <div class="card">
            <img src="/static/assets/failed.jpg" class="header-img" alt="Post Office">

            <div class="content">
                <h1>Welcome to Ankh Morpork Post Station</h1>
                <form action="/post-letter" method="POST" enctype="multipart/form-data" onsubmit="return validateForm()">
    
    <div class="form-group">
        <label>Sender Name:</label>
        <input type="text" name="sender" placeholder="John Doe" required>
        <label>Access Pairs(Waybill ID and Courier Key):</label>
        <div class="access-ids">
            <input type="text" name="waybill-ids" placeholder="John Doe" required>
            <input type="password" name="key" placeholder="afjwh" required>
        </div>
        <div class="access-controls">
            <button type="button" onclick="addAccessIds()">+ Add</button>
            <button type="button" onclick="removeAccessIds()" style="color: var(--accent-red); border-color: var(--accent-red);"> - Remove</button>
        </div>
    </div>

    <div class="form-group">
        <label>Notification Email:</label>
        <input type="email" name="email" placeholder="Lx5Q3@example.com" required>
        <div class="emailerror"></div>
    </div>

    <div class="form-group full-width">
        <label>Message for delivery(Which is guranteed by the Post Master Lipwig....someday probably):</label>
        <textarea name="message" rows="5" placeholder="Write your letter here.....(this can be seen on the accces page when the post is delivered.)" required></textarea>
    </div>

    <div class="form-group">
        <label>Images (Post Master Lipwig respects everyones privacy:</label>
        <input type="file" name="images" accept="image/*" multiple>
    </div>

    <div class="form-group">
        <label>Attachments (Well... cant really say, he's new and all.):</label>
        <input type="file" name="attachments" multiple>
    </div>
    <p>*Images and Attachments will be sent with the Email only!</p>
    <button type="submit" class="stamp-btn">Seal and Send Post</button>
    <br>
        <div class="error"></div>
</form>

            </div>
        </div>
    </div>

    <!-- JavaScript -->
    <script>
        function addAccessIds() {
            const accessDiv = document.querySelector('.access-ids');
            const error = document.querySelector('.error');
            error.innerHTML = '';

            if (accessDiv.children.length >= 16) {
                error.innerHTML = 'You can only add up to 8 access ids';
                error.style.color = 'red';
                return;
            }

            const input = document.createElement('input');
            input.type = 'text';
            input.name = 'waybill-ids';
            input.placeholder = 'John Doe';
            input.required = true;

            const k = document.createElement('input');
            k.type = 'password';
            k.name = 'key';
            k.placeholder = 'afjwh';
            k.required = true;

            accessDiv.appendChild(input);
            accessDiv.appendChild(k);
        }

        function removeAccessIds() {
            const accessDiv = document.querySelector('.access-ids');
            const error = document.querySelector('.error');
            error.innerHTML = '';

            if (accessDiv.children.length <= 2) {
                error.innerHTML = 'You must have at least one access id';
                error.style.color = 'red';
                return;
            }

            accessDiv.removeChild(accessDiv.lastElementChild);
            accessDiv.removeChild(accessDiv.lastElementChild);
        }

        function validateForm() {

            const error = document.querySelector('.error');
            const emailError = document.querySelector('.emailerror');

            error.innerHTML = "";
            emailError.innerHTML = "";

            const sender = document.querySelector('input[name="sender"]').value.trim();
            const email = document.querySelector('input[name="email"]').value.trim();
            const message = document.querySelector('textarea[name="message"]').value.trim();

            const form = document.querySelector('form[action="/post-letter"]');
            const waybills = form.querySelectorAll('input[name="waybill-ids"]');
            const keys = form.querySelectorAll('input[name="key"]');

            const emailRegex = /^(([^<>()\[\]\\.,;:\s@"]+(\.[^<>()\[\]\\.,;:\s@"]+)*)|(".+"))@((\[[0-9]{1,3}\.[0-9]{1,3}\.[0-9]{1,3}\.[0-9]{1,3}\])|(([a-zA-Z\-0-9]+\.)+[a-zA-Z]{2,}))$/;

            // Sender
            if (sender.length < 2) {
                showError("Sender name must be at least 2 characters.");
                return false;
            }

            // Email
            if (!email) {
                emailError.innerHTML = "Email is required";
                emailError.style.color = "red";
                return false;
            }

            if (!emailRegex.test(email)) {
                emailError.innerHTML = "Invalid email address";
                emailError.style.color = "red";
                return false;
            }

            // Message
            if (message.length < 10) {
                showError("The message is too short for Moist von Lipwig to deliver.");
                return false;
            }

            // Access pairs
            for (let i = 0; i < waybills.length; i++) {

                const wb = waybills[i].value.trim();
                const k = keys[i].value.trim();

                if (!wb || !k) {
                    showError(`Access Pair #${i + 1} is missing data.`);
                    return false;
                }

                if (wb.length < 2) {
                    showError(`Courier Waybill #${i + 1} must be at least 2 characters.`);
                    return false;
                }

                if (k.length < 4) {
                    showError(`Courier Key #${i + 1} must be at least 4 characters.`);
                    return false;
                }

                if (k.includes(" ")) {
                    showError(`Courier Key #${i + 1} cannot contain spaces.`);
                    return false;
                }
            }

            return true;
        }
        function showError(msg) {
            const error = document.querySelector('.error');
            error.innerHTML = msg;
            error.style.color = 'red';
            error.scrollIntoView({ behavior: 'smooth' });
        }

        function validateTopBar() {

        const waybill = document.querySelector('.top-bar input[name="waybill"]').value.trim();
        const key = document.querySelector('.top-bar input[name="key"]').value.trim();

        if (!waybill || !key) {
            alert("Waybill ID and Courier Key are required.");
            return false;
        }

        if (waybill.length < 2) {
            alert("Waybill ID must be at least 2 characters.");
            return false;
        }

        if (key.length < 4) {
            alert("Courier Key must be at least 4 characters.");
            return false;
        } 

        if (key.includes(" ")) {
            alert("Courier Key cannot contain spaces.");
            return false;
        }

        return true;
    }
    </script>

</body>
</html>
